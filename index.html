<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMD Luxe — Automated Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
/* CSS: আপনার ওয়েবসাইটের ডিজাইন */
* { margin:0; padding:0; box-sizing:border-box; }
:root { --blue:#1565C0; --blue-dark:#0D47A1; --gray:#F5F7FA; }
body { font-family:'Lato', sans-serif; background:var(--white); color:#333; }
nav { background:var(--blue-dark); color:white; padding:15px 40px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.logo { font-family:'Playfair Display', serif; font-size:24px; cursor:pointer; }
.logo span { color:#90CAF9; }
.hero { background: linear-gradient(135deg, #0D47A1, #1565C0); color:white; padding:80px 20px; text-align:center; }
.container { max-width: 1000px; margin: auto; padding: 40px 20px; }
.section-title { text-align:center; font-family:'Playfair Display'; font-size:32px; margin-bottom:30px; }

/* Product Grid */
.prod-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:25px; }
.prod-card { border:1px solid #ddd; border-radius:12px; overflow:hidden; transition: 0.3s; background:white; }
.prod-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
.prod-img { height:180px; background:#E3F2FD; display:flex; align-items:center; justify-content:center; font-size:50px; position:relative; }
.prod-info { padding:20px; }
.price { font-size:20px; font-weight:700; color:var(--blue-dark); }
.add-btn { background:var(--blue); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:700; }
.add-btn:disabled { background:#ccc; cursor:not-allowed; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; padding:30px; border-radius:15px; width:90%; max-width:450px; position:relative; }
.modal input, .modal textarea, .modal select { width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; font-size:14px; }
.confirm-btn { width:100%; background:var(--blue-dark); color:white; border:none; padding:15px; border-radius:8px; font-weight:700; cursor:pointer; margin-top:10px; }

.badge-sold { position:absolute; top:10px; right:10px; background:red; color:white; font-size:11px; padding:4px 8px; border-radius:4px; }

/* Loading Animation */
#loader { text-align:center; padding:50px; font-size:18px; color:var(--blue); }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="location.reload()">SMD <span>Luxe</span></div>
  <div style="font-size:13px">Premium Accessories</div>
</nav>

<div class="hero">
  <h1>Exclusive Collection</h1>
  <p>গুগল শিট থেকে অটোমেটিক আপডেট হওয়া লেটেস্ট প্রোডাক্টস</p>
</div>

<div class="container">
  <h2 class="section-title">Our Shop</h2>
  <div id="loader">প্রোডাক্ট লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
  <div class="prod-grid" id="main-grid"></div>
</div>

<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <button onclick="closeModal()" style="float:right; border:none; background:none; font-size:20px; cursor:pointer;">✕</button>
    <div id="modal-form">
      <h2 id="m-name">Product Name</h2>
      <p id="m-sub" style="color:gray; font-size:13px; margin-bottom:15px;"></p>
      <hr>
      <div style="margin:15px 0; background:#f0f7ff; padding:10px; border-radius:8px;">
        <p>Price: <span id="m-price">0</span></p>
        <p>Delivery: ৳ 60</p>
        <p><strong>Total: <span id="m-total">0</span></strong></p>
      </div>
      
      <input type="text" id="cust-name" placeholder="আপনার পুরো নাম">
      <input type="tel" id="cust-phone" placeholder="মোবাইল নম্বর (১১ ডিজিট)">
      <textarea id="cust-address" rows="2" placeholder="আপনার পূর্ণ ঠিকানা (বাসা নং, রোড, এলাকা, জেলা)"></textarea>
      
      <select id="cust-payment">
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="bKash">bKash (Send Money)</option>
        <option value="Nagad">Nagad (Send Money)</option>
      </select>

      <button class="confirm-btn" onclick="submitOrder()">✅ কনফার্ম অর্ডার</button>
    </div>

    <div id="modal-success" style="display:none; text-align:center; padding:20px;">
      <div style="font-size:60px">🎉</div>
      <h2>অর্ডার সফল হয়েছে!</h2>
      <p style="margin:10px 0;">অর্ডার আইডি: <strong id="res-id"></strong></p>
      <p>আমরা খুব দ্রুত আপনার সাথে যোগাযোগ করবো। ধন্যবাদ!</p>
      <button class="confirm-btn" onclick="closeModal()">ঠিক আছে</button>
    </div>
  </div>
</div>

<script>
// ================= CONFIGURATION =================
// আপনার Google Web App URL টি নিচের কোটেশনের ভেতরে বসান
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwx_zRCeowG_NVp092awrhJ6HdMmHMe5EqLz61Aaybk1nuR0AKQEj-M7-7a42Y-9xEj/exec"; 

let ALL_PRODUCTS = [];
let selectedProduct = null;

// ১. শিট থেকে প্রোডাক্ট লোড করা
async function fetchProducts() {
  try {
    const response = await fetch(`${SCRIPT_URL}?action=getProducts`);
    ALL_PRODUCTS = await response.json();
    displayProducts(ALL_PRODUCTS);
    document.getElementById('loader').style.display = 'none';
  } catch (error) {
    console.error("Error:", error);
    document.getElementById('loader').innerText = "প্রোডাক্ট লোড করা যায়নি। লিঙ্ক চেক করুন।";
  }
}

// ২. প্রোডাক্টগুলো ওয়েবসাইটে দেখানো
function displayProducts(products) {
  const grid = document.getElementById('main-grid');
  grid.innerHTML = products.map(p => `
    <div class="prod-card">
      <div class="prod-img">
        ${p.emoji}
        ${!p.stock ? '<span class="badge-sold">Sold Out</span>' : ''}
      </div>
      <div class="prod-info">
        <div style="font-weight:700; font-size:17px;">${p.name}</div>
        <div style="color:gray; font-size:12px; margin-bottom:10px;">${p.sub}</div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="price">৳ ${p.price}</span>
          <button class="add-btn" onclick="openOrder('${p.id}')" ${!p.stock ? 'disabled' : ''}>
            ${p.stock ? 'অর্ডার করুন' : 'স্টক আউট'}
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

// ৩. অর্ডার ফর্ম ওপেন করা
function openOrder(id) {
  selectedProduct = ALL_PRODUCTS.find(p => p.id == id);
  document.getElementById('m-name').innerText = selectedProduct.name;
  document.getElementById('m-sub').innerText = selectedProduct.sub;
  document.getElementById('m-price').innerText = "৳ " + selectedProduct.price;
  document.getElementById('m-total').innerText = "৳ " + (selectedProduct.price + 60);
  
  document.getElementById('modal-form').style.display = 'block';
  document.getElementById('modal-success').style.display = 'none';
  document.getElementById('orderModal').classList.add('open');
}

function closeModal() { document.getElementById('orderModal').classList.remove('open'); }

// ৪. অর্ডার শিটে পাঠানো
async function submitOrder() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const address = document.getElementById('cust-address').value.trim();
  const payment = document.getElementById('cust-payment').value;

  if(!name || !phone || !address) return alert("দয়া করে নাম, ফোন এবং পূর্ণ ঠিকানা দিন।");
  if(phone.length < 11) return alert("সঠিক মোবাইল নম্বর দিন।");

  const btn = document.querySelector('.confirm-btn');
  btn.innerText = "অর্ডার প্রসেস হচ্ছে...";
  btn.disabled = true;

  const orderData = {
    orderId: "ORD-" + Math.floor(Math.random() * 900000 + 100000),
    name, phone, address, payment,
    product: selectedProduct.name,
    qty: 1,
    total: selectedProduct.price + 60
  };

  try {
    const query = new URLSearchParams(orderData).toString();
    const res = await fetch(`${SCRIPT_URL}?${query}`);
    const data = await res.json();
    
    if(data.success) {
      document.getElementById('modal-form').style.display = 'none';
      document.getElementById('modal-success').style.display = 'block';
      document.getElementById('res-id').innerText = orderData.orderId;
    }
  } catch (error) {
    alert("অর্ডার করার সময় সমস্যা হয়েছে। আবার চেষ্টা করুন।");
  } finally {
    btn.innerText = "✅ কনফার্ম অর্ডার";
    btn.disabled = false;
  }
}

// পেজ লোড হলে রান হবে
window.onload = fetchProducts;
</script>

</body>
</html>
